<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>AZM Store</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ══════════════ CSS VARS — ALL COLORS HERE ══════════════ */
:root{
  --c-primary:#e81212;
  --c-dark:#990000;
  --c-accent:#c01010;
  --c-bg:#1a0808;
  --c-card:rgba(255,255,255,0.07);
  --c-card-solid:#2a0d0d;
  --c-text:#f0e8e8;
  --c-text2:#c8a0a0;
  --c-text3:#9a6868;
  --c-border:rgba(255,255,255,0.12);
  --c-shadow:200,20,20;
  --c-chip-active-bg:#c01010;
  --c-tab-active-bg:#c01010;
  --c-btn-bar:rgba(255,255,255,0.08);
  --c-title:#ffffff;
  --tab-bar-bg:rgba(18,6,6,0.96);
  --tab-wrapper-bg:#1a0808;
  --header-grad:linear-gradient(135deg,#8b0000,#c01010);
  --center-btn-grad:linear-gradient(135deg,#e81212,#990000);
  --page-bg:linear-gradient(180deg,#2d0808 0%,#1a0808 60%,#0f0404 100%);
}
/* ══════════════ RESET ══════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Cairo',sans-serif;color:var(--c-text);display:flex;flex-direction:column;height:100vh;background:var(--c-bg)}
button{font-family:'Cairo',sans-serif;cursor:pointer;border:none;background:none}
input,select,textarea{font-family:'Cairo',sans-serif}
a{text-decoration:none}
/* ══════════════ BG OVERLAY ══════════════ */
#bg-overlay{
  position:fixed;inset:0;z-index:0;
  background:var(--page-bg);
  background-size:cover;background-position:center;background-repeat:no-repeat;
  transition:background .4s;
}
/* ══════════════ LAYOUT ══════════════ */
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden;position:relative;z-index:1;background:transparent!important}
#page{flex:1;overflow-y:auto;padding-bottom:80px;-webkit-overflow-scrolling:touch}
.warn-bar{background:rgba(180,10,10,0.92);color:#fff;text-align:center;padding:6px 12px;font-size:12px;font-weight:700;flex-shrink:0;letter-spacing:.3px}
/* ══════════════ TAB BAR ══════════════ */
.tab-bar-wrapper{position:fixed;bottom:0;left:0;right:0;padding:6px 10px 8px;background:var(--tab-wrapper-bg);z-index:100;border-top:1px solid var(--c-border)}
.tab-bar{display:flex;align-items:flex-end;justify-content:space-around;background:var(--tab-bar-bg);border-radius:28px;padding:4px 2px;box-shadow:0 0 24px rgba(var(--c-shadow),.25);gap:2px;border:1px solid var(--c-border)}
.tab-item{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;padding:7px 2px 5px;border-radius:22px;transition:background .18s;font-size:10px;font-weight:700;color:var(--c-text3)}
.tab-item.active{background:var(--c-tab-active-bg);color:#fff}
.tab-item svg{width:20px;height:20px;transition:all .18s}
.tab-center-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;top:-8px}
.tab-center-btn{width:50px;height:50px;border-radius:50%;background:var(--center-btn-grad);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(var(--c-shadow),.55);border:3px solid var(--c-bg);transition:transform .15s}
.tab-center-btn:active{transform:scale(0.92)}
.tab-center-label{font-size:10px;font-weight:700;color:var(--c-text2)}
/* ══════════════ BALANCE CARD ══════════════ */
.balance-card{margin:12px 12px 0;border-radius:18px;background:rgba(255,255,255,0.05);border:1px solid var(--c-border);padding:14px 16px;backdrop-filter:blur(8px)}
.balance-card-inner{display:flex;align-items:center;justify-content:space-between}
.balance-left{display:flex;flex-direction:column;gap:6px}
.balance-uid{background:rgba(255,255,255,0.12);border-radius:20px;padding:4px 12px;font-size:12px;font-weight:700;color:var(--c-text);display:inline-block;width:fit-content}
.balance-add-btn{background:linear-gradient(135deg,#00c864,#00a050);border-radius:20px;padding:6px 18px;font-size:13px;font-weight:800;color:#fff;display:inline-flex;align-items:center;gap:5px;width:fit-content;cursor:pointer;box-shadow:0 3px 12px rgba(0,180,80,.35)}
.balance-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.balance-label{font-size:12px;color:var(--c-text2);font-weight:600}
.balance-val{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px}
.balance-wallet{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#0088cc,#005580);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;box-shadow:0 3px 12px rgba(0,100,200,.3)}
/* ══════════════ SECTIONS GRID ══════════════ */
.sections-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px}
.sec-card{border-radius:16px;overflow:hidden;background:rgba(255,255,255,0.06);border:1px solid var(--c-border);cursor:pointer;transition:transform .12s,box-shadow .12s;-webkit-tap-highlight-color:transparent}
.sec-card:active{transform:scale(0.93)}
.sec-card-img{width:100%;aspect-ratio:1;overflow:hidden;position:relative;background:linear-gradient(135deg,rgba(var(--c-shadow),.3),rgba(0,0,0,.4));display:flex;align-items:center;justify-content:center;font-size:30px}
.sec-card-img img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.sec-card-label{padding:6px 4px;text-align:center;font-size:11px;font-weight:700;color:var(--c-text);line-height:1.2}
/* ══════════════ BACK HEADER ══════════════ */
.page-header{background:var(--header-grad);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px}
.page-header h2{font-size:16px;font-weight:800;flex:1}
.page-header .sub{font-size:11px;opacity:.8;margin-top:1px}
.back-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0}
/* ══════════════ PRODUCTS LIST ══════════════ */
.products-list{display:flex;flex-direction:column;gap:10px;padding:10px 12px 0}
.product-card{background:var(--c-card);border-radius:16px;border:1px solid var(--c-border);overflow:hidden;display:flex;align-items:center;gap:12px;padding:12px;cursor:pointer;transition:transform .12s;-webkit-tap-highlight-color:transparent}
.product-card:active{transform:scale(0.97)}
.product-icon{width:52px;height:52px;border-radius:12px;background:linear-gradient(135deg,rgba(var(--c-shadow),.3),rgba(0,0,0,.4));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0;overflow:hidden}
.product-icon img{width:100%;height:100%;object-fit:cover}
.product-info{flex:1;min-width:0}
.product-name{font-size:14px;font-weight:800;color:var(--c-text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-desc{font-size:11px;color:var(--c-text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.product-arrow{color:var(--c-primary);font-size:20px;font-weight:700}
/* ══════════════ BOTTOM SHEET ══════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;backdrop-filter:blur(3px)}
.overlay.open{display:flex}
.sheet{background:var(--c-card-solid);width:100%;border-radius:24px 24px 0 0;max-height:90vh;overflow-y:auto;border-top:1px solid var(--c-border)}
.sheet-handle{width:40px;height:4px;background:var(--c-border);border-radius:2px;margin:10px auto 4px;cursor:pointer}
.sheet-header{padding:10px 16px 14px;border-bottom:1px solid var(--c-border);font-size:16px;font-weight:800;color:var(--c-title)}
.tier-list{display:flex;flex-direction:column;gap:10px;padding:14px 12px}
.tier-item{background:var(--c-btn-bar);border-radius:14px;padding:14px;display:flex;align-items:center;justify-content:space-between;border:2px solid transparent;cursor:pointer;transition:all .15s}
.tier-item:active{transform:scale(0.97)}
.tier-item.selected{border-color:var(--c-primary);background:rgba(var(--c-shadow),.15)}
.tier-name{font-size:14px;font-weight:700;color:var(--c-text)}
.tier-price{font-size:15px;font-weight:800;color:var(--c-primary)}
/* ══════════════ INPUTS ══════════════ */
.input-wrap{padding:0 12px;margin-top:10px}
.input-label{font-size:12px;font-weight:700;color:var(--c-text2);margin-bottom:5px}
.inp{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--c-border);background:var(--c-btn-bar);font-size:14px;color:var(--c-text);outline:none;transition:border .15s}
.inp:focus{border-color:var(--c-primary)}
.inp::placeholder{color:var(--c-text3)}
/* ══════════════ BUTTONS ══════════════ */
.btn{display:block;width:calc(100% - 24px);margin:12px 12px 0;padding:13px;border-radius:14px;font-size:15px;font-weight:800;text-align:center;transition:opacity .15s;cursor:pointer}
.btn:active{opacity:.82}
.btn-primary{background:var(--header-grad);color:#fff}
.btn-danger{background:#dc2626;color:#fff}
.btn-success{background:#16a34a;color:#fff}
.btn-outline{border:2px solid var(--c-primary);color:var(--c-primary);background:transparent}
/* ══════════════ DEPOSIT METHODS ══════════════ */
.methods-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 12px 0}
.method-item{background:var(--c-card);border-radius:16px;border:2px solid transparent;cursor:pointer;overflow:hidden;transition:all .18s}
.method-item.selected{border-color:var(--c-primary)}
.method-img-wrap{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,rgba(var(--c-shadow),.4),rgba(0,0,0,.5));overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:36px}
.method-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}
.method-check{position:absolute;top:6px;left:6px;width:22px;height:22px;border-radius:50%;background:var(--c-primary);color:#fff;font-size:13px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .18s}
.method-item.selected .method-check{opacity:1}
.method-body{padding:10px}
.method-title{font-size:13px;font-weight:800;color:var(--c-text)}
.method-desc{font-size:11px;color:var(--c-text3);margin-top:3px;line-height:1.4}
.method-rate{font-size:10px;color:var(--c-text3);margin-top:4px}
/* ── Copy code box ── */
.method-code-box{display:flex;align-items:center;gap:6px;margin-top:6px;background:rgba(var(--c-shadow),.12);border-radius:8px;padding:6px 8px}
.method-code-text{flex:1;font-size:12px;font-weight:800;color:var(--c-primary);letter-spacing:.5px}
.copy-btn{background:var(--c-primary);color:#fff;border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;transition:opacity .15s}
.copy-btn:active{opacity:.7}
/* ── Deposit detail card ── */
.dep-method-detail{margin:10px 12px 0;border-radius:16px;border:1px solid var(--c-border);overflow:hidden}
.dep-method-detail-img{width:100%;height:140px;object-fit:cover;display:block;background:linear-gradient(135deg,rgba(var(--c-shadow),.4),rgba(0,0,0,.5));display:flex;align-items:center;justify-content:center;font-size:48px}
.dep-method-detail-img img{width:100%;height:100%;object-fit:cover}
.dep-method-detail-body{padding:12px}
.dep-method-detail-title{font-size:15px;font-weight:800;color:var(--c-title)}
.dep-method-detail-desc{font-size:12px;color:var(--c-text2);margin-top:4px;line-height:1.5}
.dep-code-full{display:flex;align-items:center;gap:8px;margin-top:10px;background:rgba(var(--c-shadow),.15);border-radius:12px;padding:10px 12px}
.dep-code-full-label{font-size:11px;color:var(--c-text3);margin-bottom:2px}
.dep-code-full-val{font-size:16px;font-weight:900;color:var(--c-primary);letter-spacing:.5px}
.dep-code-copy{background:var(--c-primary);color:#fff;border-radius:10px;padding:8px 14px;font-size:12px;font-weight:800;cursor:pointer;flex-shrink:0;transition:transform .15s}
.dep-code-copy:active{transform:scale(0.94)}
/* ══════════════ CARDS ══════════════ */
.card{background:var(--c-card);border-radius:16px;border:1px solid var(--c-border);padding:14px;margin:10px 12px 0}
/* ══════════════ ORDER ITEMS ══════════════ */
.order-item{background:var(--c-card);border-radius:14px;padding:12px;margin:10px 12px 0;border:1px solid var(--c-border)}
.order-row{display:flex;justify-content:space-between;align-items:center}
.order-title{font-size:13px;font-weight:700;color:var(--c-text)}
.order-sub{font-size:11px;color:var(--c-text3);margin-top:3px}
.order-price{font-size:14px;font-weight:800;color:var(--c-primary)}
/* ══════════════ BADGES ══════════════ */
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.badge-pending{background:rgba(234,179,8,.2);color:#fbbf24}
.badge-completed,.badge-approved{background:rgba(22,163,74,.2);color:#4ade80}
.badge-rejected,.badge-cancelled{background:rgba(220,38,38,.2);color:#f87171}
.badge-processing{background:rgba(59,130,246,.2);color:#60a5fa}
/* ══════════════ SUPPORT ══════════════ */
.support-center{display:flex;flex-direction:column;align-items:center;padding:40px 20px;text-align:center;gap:16px}
.support-icon{width:80px;height:80px;border-radius:50%;background:var(--header-grad);display:flex;align-items:center;justify-content:center;font-size:38px}
.support-title{font-size:18px;font-weight:800;color:var(--c-title)}
.support-sub{font-size:13px;color:var(--c-text2);line-height:1.7}
.support-link{display:inline-block;padding:12px 32px;background:linear-gradient(135deg,#0088cc,#005580);color:#fff;border-radius:14px;font-size:14px;font-weight:700}
/* ══════════════ ADMIN ══════════════ */
.admin-tabs{display:flex;gap:0;border-bottom:1px solid var(--c-border);padding:0 8px;overflow-x:auto;scrollbar-width:none;background:transparent}
.admin-tabs::-webkit-scrollbar{display:none}
.admin-tab{flex-shrink:0;padding:10px 10px;font-size:11px;font-weight:700;color:var(--c-text3);border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;cursor:pointer;transition:color .15s}
.admin-tab.active{color:var(--c-primary);border-bottom-color:var(--c-primary)}
.admin-item{background:var(--c-card);border-radius:14px;padding:12px;margin:10px 12px 0;border:1px solid var(--c-border)}
.admin-actions{display:flex;gap:8px;margin-top:10px}
.admin-btn{flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;border:none;font-family:'Cairo',sans-serif}
.admin-btn-approve{background:rgba(22,163,74,.2);color:#4ade80}
.admin-btn-reject{background:rgba(220,38,38,.2);color:#f87171}
.admin-btn-edit{background:rgba(234,179,8,.2);color:#fbbf24}
.admin-btn-neutral{background:rgba(255,255,255,.08);color:var(--c-text2)}
.section-form{background:var(--c-card);border-radius:16px;padding:14px;margin:10px 12px 0;border:1px solid var(--c-border)}
.setting-row{padding:0 12px;margin-top:12px}
.setting-label{font-size:12px;font-weight:700;color:var(--c-text2);margin-bottom:5px}
.setting-inp{width:100%;padding:10px 12px;border-radius:10px;border:1.5px solid var(--c-border);background:rgba(255,255,255,.05);font-size:13px;color:var(--c-text);outline:none;transition:border .15s;font-family:'Cairo',sans-serif}
.setting-inp:focus{border-color:var(--c-primary)}
.setting-inp::placeholder{color:var(--c-text3)}
/* ══════════════ APPEARANCE ══════════════ */
.theme-preview{margin:12px;border-radius:16px;overflow:hidden;height:130px;position:relative;border:1px solid var(--c-border)}
.color-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:0 12px}
.color-swatch{height:48px;border-radius:12px;cursor:pointer;border:2px solid transparent;transition:all .15s;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.color-swatch.selected{border-color:#fff;transform:scale(1.1)}
.upload-zone{margin:10px 12px 0;border:2px dashed var(--c-border);border-radius:16px;padding:22px 16px;text-align:center;cursor:pointer;background:var(--c-btn-bar);transition:border-color .15s}
.upload-zone:hover{border-color:var(--c-primary)}
/* ══════════════ STATS ══════════════ */
.stats-row{display:flex;gap:10px;padding:10px 12px 0}
.stat-box{flex:1;background:var(--c-card);border-radius:14px;padding:12px;text-align:center;border:1px solid var(--c-border)}
.stat-val{font-size:17px;font-weight:800;color:var(--c-primary)}
.stat-lbl{font-size:11px;color:var(--c-text3);margin-top:2px}
/* ══════════════ IMG PICK ══════════════ */
.img-pick-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--c-border)}
.img-pick-wrap img{width:100%;height:90px;object-fit:cover;display:block}
.img-pick-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(0,0,0,.4)}
.img-pick-zone{width:100%;padding:14px;border-radius:10px;border:2px dashed var(--c-border);background:var(--c-btn-bar);color:var(--c-text3);cursor:pointer;font-size:13px;font-weight:700;text-align:center;font-family:'Cairo',sans-serif}
.img-pick-zone:hover{border-color:var(--c-primary);color:var(--c-primary)}
/* ══════════════ EMPTY & SPINNER ══════════════ */
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 20px;color:var(--c-text3);gap:10px}
.empty-icon{font-size:44px}
.empty-text{font-size:14px;font-weight:600}
.spinner{display:flex;justify-content:center;padding:30px}
.spinner::after{content:'';width:28px;height:28px;border-radius:50%;border:3px solid var(--c-border);border-top-color:var(--c-primary);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* ══════════════ TOAST ══════════════ */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;border:1px solid var(--c-border)}
#toast.show{opacity:1}
/* ══════════════ SECTION HEADER ══════════════ */
.store-header{padding:12px 16px 6px;display:flex;align-items:center;justify-content:space-between}
.store-title{font-size:18px;font-weight:900;color:var(--c-title)}
.store-sub{font-size:12px;color:var(--c-text3);margin-top:1px}
</style>
</head>
<body>
<div id="bg-overlay"></div>
<div id="app">
  <div id="warn-bar" class="warn-bar" style="display:none">⚠️ افتح من داخل تيليغرام للحصول على تجربة كاملة</div>
  <div id="page"></div>
  <div class="tab-bar-wrapper"><div class="tab-bar" id="tab-bar"></div></div>
</div>
<div class="overlay" id="product-sheet"><div class="sheet" id="sheet-content"></div></div>
<input type="file" id="_file_input" accept="image/*" style="display:none"/>
<div id="toast"></div>
<script>
// ════════════════════════════════════════════
// ⚙️  CONFIG
// ════════════════════════════════════════════
const API_BASE = "";
const ADMIN_IDS = [6200238604, 7286288857];

// ════════════════════════════════════════════
// TELEGRAM
// ════════════════════════════════════════════
const tg = window.Telegram?.WebApp;
let tgUser = null;
if (tg) { tg.expand?.(); tg.ready?.(); tgUser = tg.initDataUnsafe?.user || null; }
const userId = tgUser?.id ?? 0;
const isAdmin = ADMIN_IDS.includes(userId);
if (!tgUser) document.getElementById("warn-bar").style.display = "block";

// ════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════
let currentTab = "home";
let userBalance = 0;
let currentSection = null; // { id, title, emoji, image }

// ════════════════════════════════════════════
// THEME ENGINE
// ════════════════════════════════════════════
const PRESET_THEMES = [
  { label:"🔴 أحمر داكن",  bg:"#1a0808", primary:"#e81212", dark:"#990000", accent:"#c01010" },
  { label:"🟫 بني دافئ",   bg:"#1e1008", primary:"#c0471a", dark:"#8b2500", accent:"#8b3a1a" },
  { label:"🌙 ليلي أزرق",  bg:"#0f1923", primary:"#3b82f6", dark:"#1d4ed8", accent:"#1e40af" },

  _bgImg = localStorage.getItem("azm_bg_img") || "";

function isDarkColor(hex) {
  try {
    let c = hex.replace("#","");
    if(c.length===3) c=c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
    if(c.length!==6) return true;
    const r=parseInt(c.slice(0,2),16),g=parseInt(c.slice(2,4),16),b=parseInt(c.slice(4,6),16);
    return (r*299+g*587+b*114)/1000 < 128;
  } catch(e){ return true; }
}

function applyTheme(theme, imgUrl) {
  if (theme) _theme = theme;
  if (imgUrl !== undefined) _bgImg = imgUrl;
  const r = document.documentElement.style;
  const isDark = isDarkColor(_theme.bg);
  r.setProperty("--c-primary",   _theme.primary);
  r.setProperty("--c-dark",      _theme.dark);
  r.setProperty("--c-accent",    _theme.accent);
  r.setProperty("--c-bg",        _theme.bg);
  r.setProperty("--c-card",      isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.04)");
  r.setProperty("--c-card-solid",isDark ? "#2a0d0d" : "#f5f0eb");
  r.setProperty("--c-text",      isDark ? "#f0e8e8" : "#1a0808");
  r.setProperty("--c-text2",     isDark ? "#c8a0a0" : "#5a3010");
  r.setProperty("--c-text3",     isDark ? "#9a6868" : "#8a6040");
  r.setProperty("--c-title",     isDark ? "#ffffff" : "#1a0808");
  r.setProperty("--c-border",    isDark ? "rgba(255,255,255,0.12)" : "rgba(0,0,0,0.1)");
  r.setProperty("--c-shadow",    isDark ? "200,20,20" : "120,60,20");
  r.setProperty("--c-btn-bar",   isDark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.04)");
  r.setProperty("--c-chip-active-bg", _theme.accent);
  r.setProperty("--c-tab-active-bg",  _theme.accent);
  r.setProperty("--tab-bar-bg",       isDark ? "rgba(10,4,4,0.96)" : "rgba(255,255,255,0.96)");
  r.setProperty("--tab-wrapper-bg",   _theme.bg);
  r.setProperty("--header-grad",      `linear-gradient(135deg,${_theme.dark},${_theme.primary})`);
  r.setProperty("--center-btn-grad",  `linear-gradient(135deg,${_theme.primary},${_theme.dark})`);
  r.setProperty("--page-bg",          `linear-gradient(180deg,${_theme.bg} 0%,${_theme.bg}cc 60%,${_theme.bg}aa 100%)`);

  // Background overlay
  const ov = document.getElementById("bg-overlay");
  if (ov) {
    ov.style.background = `linear-gradient(180deg,${_theme.bg} 0%,${_theme.dark}44 100%)`;
    if (_bgImg) {
      const src = _bgImg.startsWith("http") || _bgImg.startsWith("data:") ? _bgImg : API_BASE + _bgImg;
      ov.style.backgroundImage = `url('${src}')`;
      ov.style.backgroundSize = "cover";
      ov.style.backgroundPosition = "center";
    } else {
      ov.style.backgroundImage = "";
    }
  }
}

async function api(path, opts={}) {
  const res = await fetch(API_BASE + path, { headers:{"Content-Type":"application/json"}, ...opts });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

// TOAST & COPY
// ════════════════════════════════════════════
function toast(msg, dur=2400) {
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  setTimeout(()=>el.classList.remove("show"), dur);
}
function copyText(text) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(()=>toast("✅ تم النسخ!")).catch(()=>_fallbackCopy(text));
  } else { _fallbackCopy(text); }
}
function _fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand("copy"); toast("✅ تم النسخ!"); } catch(e){ toast("فشل النسخ"); }
  document.body.removeChild(ta);
}

let _uploadCallback = null;
document.getElementById("_file_input").addEventListener("change", async function(){
  const file = this.files[0];
  if(!file||!_uploadCallback) return;
  if(file.size > 5*1024*1024){ toast("❌ الصورة أكبر من 5 MB"); return; }
  toast("⏳ جارٍ الرفع...");
  const fd = new FormData(); fd.append("file", file);
  try {
    const res = await fetch(API_BASE + "/api/shop/upload", {method:"POST", body:fd});
    const data = await res.json();
    if(data.url){ _uploadCallback(data.url); } else toast("❌ فشل الرفع");
  } catch(e){ toast("❌ فشل رفع الصورة"); }
  this.value = "";
});

async function placeOrder(catId){
  if(!userId){ toast("افتح من داخل تيليغرام"); return; }
  const playerId=document.getElementById("player-id-inp")?.value?.trim();
  if(!playerId){ toast("أدخل "+( selectedTier?.label||"معرف اللاعب")); return; }
  const qty=parseInt(document.getElementById("qty-inp")?.value||"1");
  try {
    await api("/api/shop/orders",{
      method:"POST",
      body:JSON.stringify({user_id:userId,product_id:currentProductId,category_id:catId,player_id:playerId,qty})
    });
    toast("✅ تم إرسال الطلب بنجاح");
    closeSheet();
    userBalance -= (selectedTier?.price||0)*qty;
    document.querySelectorAll(".balance-val").forEach(el=>el.textContent="$ "+parseFloat(String(userBalance)).toFixed(3));
  } catch(e){ toast(e.message.includes("رصيد")?"❌ رصيدك غير كافٍ":"❌ فشل إرسال الطلب"); }
}

  const img=imgSrc(m.image);
  det.style.display="block";
  det.innerHTML=`
    <div class="dep-method-detail">
      <div class="dep-method-detail-img" style="${img?"":"display:flex;align-items:center;justify-content:center;font-size:48px;height:120px;"}">
        ${img?`<img src="${img}" alt="${H(m.title)}"/>`:"💳"}
      </div>
      <div class="dep-method-detail-body">
        <div class="dep-method-detail-title">${H(m.title)}</div>
        ${m.description?`<div class="dep-method-detail-desc">${H(m.description)}</div>`:""}
        <div class="dep-method-detail-desc" style="margin-top:6px">💱 سعر الصرف: <b>${Number(m.exchange_rate||0).toLocaleString()}</b> ل.س = 1$</div>
        ${m.code&&m.code!=="0"?`
        <div class="dep-code-full">
          <div style="flex:1">
            <div class="dep-code-full-label">📱 رقم التحويل</div>
            <div class="dep-code-full-val">${H(m.code)}</div>
          </div>
          <button class="dep-code-copy" onclick="copyText('${H(m.code)}')">📋 نسخ الرقم</button>
        </div>`:""}
      </div>
    </div>`;
  document.getElementById("deposit-form-wrap").style.display="block";
  document.getElementById("dep-amount").oninput=function(){
    const v=parseFloat(this.value||"0");
    if(v>0 && m.exchange_rate>0){
      const usd=(v/m.exchange_rate).toFixed(2);
      document.getElementById("dep-calc").textContent=`💵 يعادل تقريباً: ${usd} $`;
    } else {
      document.getElementById("dep-calc").textContent="";
    }
  };
}

async function submitDeposit(){
  if(!userId){ toast("افتح من داخل تيليغرام"); return; }
  if(!selectedMethod){ toast("اختر طريقة الدفع"); return; }
  const amount=parseFloat(document.getElementById("dep-amount")?.value||"0");
  const code=document.getElementById("dep-code")?.value.trim();
  if(!amount||amount<=0){ toast("أدخل مبلغاً صحيحاً"); return; }
  if(!code){ toast("أدخل رقم العملية"); return; }
  try {
    await api("/api/shop/deposits",{
      method:"POST",
      body:JSON.stringify({
        user_id:userId, method_id:selectedMethod.id, amount_syp:amount,
        transaction_code:code,
        username:tgUser?.username||"",
        full_name:((tgUser?.first_name||"")+" "+(tgUser?.last_name||"")).trim(),
      })
    });
    toast("✅ تم إرسال طلب الشحن، سيتم مراجعته قريباً");
    document.getElementById("dep-amount").value="";
    document.getElementById("dep-code").value="";
    selectedMethod=null;
    document.getElementById("deposit-detail").style.display="none";
    document.getElementById("deposit-form-wrap").style.display="none";
    renderMethods();
  } catch(e){ toast("❌ فشل إرسال الطلب"); }
}

async function loadAdminContent(){
  const wrap=document.getElementById("admin-content");

async function fetchPricesFromProvider(pid){
  const box=document.getElementById("pl-result-"+pid);
  // Get product info
  let prod;
  try{ prod=await api(`/api/shop/products/${pid}`); }catch(e){ toast("❌ فشل جلب المنتج"); return; }
  if(!prod.provider_id||!prod.provider_product_id){
    toast("⚠️ اربط المنتج بمزود أولاً");
    return;
  }
  if(box) box.innerHTML=`<div style="font-size:11px;color:var(--c-text3)">⏳ جلب الأسعار...</div>`;
  try{
    const r=await api(`/api/shop/providers/${prod.provider_id}/products/${prod.provider_product_id}`);
    const p=r.product;
    if(!p){ if(box) box.innerHTML=`<div style="font-size:11px;color:#f44336">❌ المنتج غير موجود في المزود</div>`; return; }
    const pType=p.product_type||"package";
    const price=parseFloat(p.price||0);
    let catCreated=0;
    if(pType==="amount"){
      // counter product
      const minQ=p.qty_values?.min||1;
      const maxQ=p.qty_values?.max||99999;
      const catName=`${prod.name} (عداد)`;
      await api(`/api/shop/products/${pid}/categories/create`,{method:"POST",body:JSON.stringify({
        name:catName, price:price, cat_type:"counter", min_qty:minQ, max_qty:maxQ, player_id_label:"معرف اللاعب"
      })});
      catCreated++;
      // update product type
      await api(`/api/shop/products/${pid}`,{method:"PATCH",body:JSON.stringify({product_type:"counter"})});
    } else {
      // package/fixed product
      const catName=p.name||prod.name;
      await api(`/api/shop/products/${pid}/categories/create`,{method:"POST",body:JSON.stringify({
        name:catName, price:price, cat_type:"fixed", min_qty:1, max_qty:1, player_id_label:"معرف اللاعب", price_usd:price
      })});
      catCreated++;
      await api(`/api/shop/products/${pid}`,{method:"PATCH",body:JSON.stringify({product_type:"fixed"})});
    }
    if(box) box.innerHTML=`<div style="font-size:11px;color:#4caf50">✅ تمت إضافة ${catCreated} فئة — السعر: $${price} | النوع: ${pType==="amount"?"عداد":"ثابتة"}</div>`;
    toast("✅ تم جلب الأسعار وإضافة الفئات");
    // reload product admin to show new categories
    setTimeout(()=>openProductAdmin(pid),800);
  }catch(e){

async function submitNewProvider(){
  const name=document.getElementById("np-prov-name")?.value.trim();
  const url=document.getElementById("np-prov-url")?.value.trim()||"https://mhd-game.com/api";
  const token=document.getElementById("np-prov-token")?.value.trim();
  if(!name||!token){ toast("⚠️ الاسم والـ Token مطلوبان"); return; }
  try{
    await api("/api/shop/providers/create",{method:"POST",body:JSON.stringify({name,api_url:url,api_token:token})});
    toast("✅ تمت الإضافة"); await loadAdminContent();
  }catch(e){ toast("❌ فشل الإضافة"); }
}

async function saveProvider(id){
  try{
    await api(`/api/shop/providers/${id}`,{method:"PATCH",body:JSON.stringify({
      name:  document.getElementById("pe-name-"+id)?.value.trim(),
      api_url:  document.getElementById("pe-url-"+id)?.value.trim(),
      api_token:document.getElementById("pe-token-"+id)?.value.trim(),
      active:document.getElementById("pe-active-"+id)?.checked?1:0,
    })});
    toast("✅ تم الحفظ"); await loadAdminContent();
  }catch(e){ toast("❌ فشل الحفظ"); }
}

async function deleteProvider(id){
  if(!confirm("حذف المزود نهائياً؟")) return;
  try{ await api(`/api/shop/providers/${id}`,{method:"DELETE"}); toast("🗑️ تم الحذف"); await loadAdminContent(); }

}

async function testProvider(id){
  const box=document.getElementById("prov-result-"+id);
  if(!box) return;
  box.innerHTML=`<div style="background:rgba(0,0,0,.15);border-radius:8px;padding:8px;font-size:11px;color:var(--c-text2)">⏳ جار الاختبار...</div>`;
  try{
    const r=await api(`/api/shop/providers/${id}/test`);
    if(r.ok){
      const acct=r.account||{};
      const email=acct.email||acct.login||acct.username||"—";
      const balance=acct.balance!==undefined?acct.balance:acct.credits;
      let msg=r.message||"✅ الاتصال يعمل";
      let details="";
      if(email&&email!=="—") details+=`📧 ${H(email)} `;
      if(balance!==undefined) details+=`💰 ${balance}`;
      box.innerHTML=`<div style="background:rgba(0,128,0,.15);border-radius:8px;padding:8px;font-size:11px;color:#4caf50">
        <div style="font-weight:800">${msg}</div>
        ${details?`<div style="margin-top:4px;color:var(--c-text2)">${details}</div>`:""}
      </div>`;
    } else {
      box.innerHTML=`<div style="background:rgba(200,0,0,.12);border-radius:8px;padding:8px;font-size:11px;color:#f44336">
        ❌ ${H(r.error||"فشل الاتصال")}
      </div>`;
    }
  }catch(e){
    box.innerHTML=`<div style="background:rgba(200,0,0,.12);border-radius:8px;padding:8px;font-size:11px;color:#f44336">❌ خطأ في الاتصال</div>`;
  }
}

async function loadProviderProducts(id){
  const box=document.getElementById("prov-products-"+id);
  if(!box) return;
  box.innerHTML=`<div style="background:rgba(0,0,0,.15);border-radius:8px;padding:8px;font-size:11px;color:var(--c-text2)">⏳ جار جلب المنتجات...</div>`;
  try{
    const r=await api(`/api/shop/providers/${id}/products`);
    const prods=r.products||[];
    if(!prods.length){
      box.innerHTML=`<div style="background:rgba(0,0,0,.15);border-radius:8px;padding:8px;font-size:11px;color:var(--c-text2)">لا توجد منتجات</div>`;
      return;
    }
    _providerProducts[id]=prods;
    // group by category
    const cats={};
    for(const p of prods){ const c=p.category_name||"أخرى"; (cats[c]=cats[c]||[]).push(p); }
    const catHtml=Object.entries(cats).map(([cat,items])=>`
      <div style="margin-bottom:6px">
        <div style="font-size:10px;font-weight:800;color:var(--c-primary);padding:2px 0">${H(cat)} (${items.length})</div>
        ${items.slice(0,5).map(p=>`
          <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--c-text2);padding:2px 4px;border-radius:4px;background:rgba(0,0,0,.1)">
            <span>${H(p.name)} <span style="color:${p.available?"#4caf50":"#f44336"}">${p.available?"✓":"✗"}</span></span>
            <span>${p.product_type==="amount"?"عداد":"ثابت"} | $${p.price||0}</span>
          </div>`).join("")}
        ${items.length>5?`<div style="font-size:10px;color:var(--c-text3);padding:2px 4px">…و ${items.length-5} أخرى</div>`:""}
      </div>`).join("");
    box.innerHTML=`<div style="background:rgba(0,0,0,.15);border-radius:8px;padding:10px;max-height:200px;overflow-y:auto">
      <div style="font-size:11px;font-weight:800;color:var(--c-title);margin-bottom:6px">📦 ${prods.length} منتج من المزود</div>
      ${catHtml}
    </div>`;
  }catch(e){
    box.innerHTML=`<div style="background:rgba(200,0,0,.12);border-radius:8px;padding:8px;font-size:11px;color:#f44336">❌ فشل جلب المنتجات</div>`;
  }
}

    <!-- صورة الخلفية -->
    <div style="height:1px;background:var(--c-border);margin:16px 12px 0"></div>
    <div style="padding:14px 12px 4px;font-size:13px;font-weight:800;color:var(--c-title)">🖼️ صورة الخلفية</div>
    <div style="padding:0 12px 6px;font-size:12px;color:var(--c-text3)">الصورة تغطي الخلفية بالكامل لجميع المستخدمين</div>
    ${_bgImg?`
      <div style="margin:0 12px;border-radius:12px;overflow:hidden;border:1px solid var(--c-border)">
        <img src="${imgSrc(_bgImg)}" style="width:100%;height:120px;object-fit:cover;display:block"/>
      </div>
      <button class="btn btn-danger" onclick="removeBgImage()" style="margin-top:8px">🗑️ إزالة الصورة</button>`:""}
    <div class="upload-zone" onclick="pickFile(uploadBgImage)">
      <div style="font-size:32px;margin-bottom:6px">📷</div>
      <div style="font-size:13px;font-weight:700;color:var(--c-text2)">${_bgImg?"تغيير صورة الخلفية":"اضغط لرفع صورة خلفية"}</div>
      <div style="font-size:11px;color:var(--c-text3);margin-top:4px">JPG · PNG · WebP — حد أقصى 5 MB</div>
    </div>

    <button class="btn btn-primary" onclick="saveFullTheme()" style="margin-top:16px">💾 حفظ المظهر لجميع المستخدمين</button>
    <div style="height:20px"></div>`;
}

function applyPresetTheme(i){ _theme={..._PRESET_THEMES?.[i]||PRESET_THEMES[i]}; applyTheme(_theme,_bgImg); loadAdminContent(); }
function setQuickBg(color){ _theme={..._theme,bg:color}; applyTheme(_theme,_bgImg); loadAdminContent(); }
function previewCustomColors(){
  const t={
    primary:document.getElementById("cp-primary")?.value||_theme.primary,
    bg:     document.getElementById("cp-bg")?.value     ||_theme.bg,
    dark:   document.getElementById("cp-dark")?.value   ||_theme.dark,
    accent: document.getElementById("cp-accent")?.value ||_theme.accent,
  };
  applyTheme(t,_bgImg);
}
async function uploadBgImage(url){
  _bgImg=url; localStorage.setItem("azm_bg_img",_bgImg);
  applyTheme(_theme,_bgImg);
  try{ await api("/api/shop/settings",{method:"PATCH",body:JSON.stringify({bg_image:_bgImg})}); }catch(e){}
  toast("✅ تم رفع الصورة وتطبيقها"); await loadAdminContent();
}
async function removeBgImage(){
  _bgImg=""; localStorage.removeItem("azm_bg_img");
  applyTheme(_theme,"");
  try{ await api("/api/shop/settings",{method:"PATCH",body:JSON.stringify({bg_image:""})}); }catch(e){}
  toast("تم إزالة صورة الخلفية"); await loadAdminContent();
}
async function saveFullTheme(){
  localStorage.setItem("azm_theme_v2",JSON.stringify(_theme));
  localStorage.setItem("azm_bg_img",_bgImg);
  applyTheme(_theme,_bgImg);
  try{
    await api("/api/shop/settings",{method:"PATCH",body:JSON.stringify({
      theme_json:JSON.stringify(_theme), bg_image:_bgImg,
    })});
    toast("✅ تم حفظ المظهر لجميع المستخدمين 🎨");
  }catch(e){ toast("❌ فشل الحفظ"); }
}

// ── Admin: Settings ──────────────────────────────────────────────
async function renderSettingsTab(wrap){
  let s={};
  try{ s=await api("/api/shop/settings"); }catch(e){}
  wrap.innerHTML=`
    <div style="padding:14px 12px 4px;font-size:13px;font-weight:800;color:var(--c-title)">⚙️ إعدادات البوت</div>
    <div class="setting-row"><div class="setting-label">رسالة الترحيب</div>
      <textarea class="setting-inp" id="s-welcome" rows="3" style="resize:none">${H(s.welcome_message||"")}</textarea></div>
    <div class="setting-row"><div class="setting-label">يوزر الدعم (بدون @)</div>
      <input class="setting-inp" id="s-support" value="${H(s.support_username||"")}" placeholder="support"/></div>
    <div class="setting-row"><div class="setting-label">سعر الصرف الافتراضي (ل.س = 1$)</div>
      <input class="setting-inp" id="s-rate" type="number" value="${s.exchange_rate||15000}"/></div>
    <button class="btn btn-primary" onclick="saveSettings()" style="margin-top:16px">💾 حفظ الإعدادات</button>
    <div style="height:20px"></div>`;
}
async function saveSettings(){
  try{
    await api("/api/shop/settings",{method:"PATCH",body:JSON.stringify({
      welcome_message: document.getElementById("s-welcome")?.value||"",
      support_username:document.getElementById("s-support")?.value||"",
      exchange_rate:   parseFloat(document.getElementById("s-rate")?.value||"15000"),
    })});
    toast("✅ تم حفظ الإعدادات");
  }catch(e){ toast("❌ فشل الحفظ"); }
}

// ════════════════════════════════════════════
// ROUTER
// ════════════════════════════════════════════
async function renderPage(){
  switch(currentTab){
    case "home":     await renderHome();        break;
    case "deposit":  await renderDeposit();     break;
    case "orders":   await renderOrders();      break;
    case "deposits": await renderMyDeposits();  break;
    case "support":  await renderSupport();     break;
    case "admin":    await renderAdmin();       break;
    default:         await renderHome();
  }
}

// ════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════
async function init(){
  _loadSavedTheme();
  applyTheme(_theme,_bgImg);

  // جلب الثيم والرصيد بالتوازي
  try{
    const s=await api("/api/shop/settings");
    if(s.theme_json){ try{ const t=JSON.parse(s.theme_json); if(t?.primary){ _theme=t; localStorage.setItem("azm_theme_v2",JSON.stringify(t)); } }catch(e){} }
    if(s.bg_image!==undefined){ _bgImg=s.bg_image||""; localStorage.setItem("azm_bg_img",_bgImg); }
    applyTheme(_theme,_bgImg);
  }catch(e){}

  if(userId){
    try{ const u=await api(`/api/shop/user/${userId}`); userBalance=u?.balance??0; }catch(e){}
  }

  renderTabBar();
  await renderPage();
}

init();
</script>
</body>
</html>
